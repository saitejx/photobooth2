<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RetroSnap</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #f5e6c8; --dark: #1a1209; --brown: #2a1f0e;
  --accent: #c8a96e; --red: #c0392b; --surface: #221a0c;
  --gap: clamp(10px, 2.5vw, 20px);
  --pad: clamp(12px, 4vw, 24px);
}
body.theme-pink  { --cream:#ffe4f0; --dark:#1a0a12; --brown:#2e1220; --accent:#e87fa8; --surface:#2a1020; }
body.theme-cyber { --cream:#00ffe0; --dark:#05000f; --brown:#0d001a; --accent:#b400ff; --surface:#100020; }

html { -webkit-text-size-adjust: 100%; }

body {
  background: var(--dark); color: var(--cream);
  font-family: 'Special Elite','Courier New',monospace;
  min-height: 100dvh;
  display: flex; flex-direction: column; align-items: center;
  padding: var(--pad) var(--pad) clamp(24px,6vw,48px);
  transition: background .4s, color .4s;
  overflow-x: hidden;
}

/* ── header ── */
h1 {
  font-size: clamp(1.3rem, 5vw, 2.2rem);
  letter-spacing: .08em; text-align: center; margin-bottom: 4px;
  text-shadow: 0 0 20px rgba(200,169,110,.4);
}
.subtitle {
  font-size: clamp(.6rem, 2vw, .75rem); color: var(--accent);
  letter-spacing: .2em; text-align: center;
  margin-bottom: clamp(10px,3vw,18px); text-transform: uppercase;
}

/* ── theme bar ── */
.top-bar {
  display: flex; gap: 8px; align-items: center;
  margin-bottom: clamp(10px,3vw,16px); flex-wrap: wrap; justify-content: center;
}
.theme-lbl { font-size: clamp(.55rem,1.8vw,.65rem); letter-spacing:.14em; color:var(--accent); text-transform:uppercase; }
.theme-btn {
  padding: clamp(5px,1.5vw,6px) clamp(10px,2.5vw,14px);
  border-radius: 20px; border: 1px solid var(--accent);
  background: transparent; color: var(--cream); font-family: inherit;
  font-size: clamp(.62rem,2vw,.72rem); cursor: pointer;
  letter-spacing: .07em; transition: all .2s;
  min-height: 36px; /* touch target */
}
.theme-btn.active, .theme-btn:hover { background: var(--accent); color: var(--dark); }

/* ── main layout: side-by-side on ≥768, stacked below ── */
.main-layout {
  display: flex; gap: clamp(16px,3vw,32px); align-items: flex-start;
  justify-content: center; width: 100%; max-width: 1020px; flex-wrap: wrap;
}
.left-col {
  display: flex; flex-direction: column; align-items: center;
  gap: clamp(10px,2.5vw,14px);
  flex: 1 1 300px; min-width: 0; max-width: 500px; width: 100%;
}

/* ── camera ── */
.camera-wrapper {
  position: relative; width: 100%; aspect-ratio: 4/3;
  border: clamp(2px,0.5vw,3px) solid var(--accent); border-radius: 4px;
  overflow: hidden; background: #000;
  box-shadow: 0 0 0 4px var(--brown), 0 0 0 6px var(--accent), 0 6px 30px rgba(0,0,0,.8);
}
#video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); display:block; }
.scanlines {
  position:absolute; inset:0; pointer-events:none; z-index:2;
  background: repeating-linear-gradient(to bottom,transparent,transparent 2px,rgba(0,0,0,.16) 2px,rgba(0,0,0,.16) 4px);
}
.vignette {
  position:absolute; inset:0; pointer-events:none; z-index:3;
  background: radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.72) 100%);
}
.sticker-layer { position:absolute; inset:0; z-index:5; overflow:hidden; }
.sticker-el {
  position:absolute; font-size: clamp(1.4rem,5vw,2rem);
  cursor:grab; user-select:none; line-height:1;
  transform:translate(-50%,-50%);
  text-shadow: 0 1px 4px rgba(0,0,0,.5);
}
.sticker-el:active { cursor:grabbing; }

/* countdown */
.countdown-overlay {
  position:absolute; inset:0; display:none;
  flex-direction:column; align-items:center; justify-content:center;
  background:rgba(0,0,0,.45); z-index:10;
}
.countdown-number {
  font-size: clamp(3.5rem,18vw,7rem); color:var(--cream);
  text-shadow: 0 0 30px rgba(200,169,110,.9);
  line-height:1; animation: pulse .6s ease-out;
}
.countdown-label { font-size: clamp(.75rem,3vw,.95rem); color:var(--accent); letter-spacing:.12em; margin-top:8px; }
@keyframes pulse { from{transform:scale(1.4);opacity:.4} to{transform:scale(1);opacity:1} }

.flash-overlay {
  position:absolute; inset:0; background:#fff; z-index:20;
  opacity:0; pointer-events:none; transition:opacity .05s;
}

/* confetti */
.confetti-piece {
  position:fixed; width:8px; height:8px; border-radius:2px;
  pointer-events:none; z-index:9999; animation:confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform:translateY(-20px) rotate(0deg);   opacity:1; }
  100% { transform:translateY(100vh) rotate(720deg); opacity:0; }
}

/* error */
.error-msg {
  width:100%; padding:12px; background:rgba(192,57,43,.15);
  border:1px solid var(--red); border-radius:4px;
  color:#e08080; font-size:clamp(.72rem,2.2vw,.82rem);
  text-align:center; line-height:1.5; display:none;
}

/* section label */
.section-label {
  font-size: clamp(.55rem,1.8vw,.62rem); letter-spacing:.16em;
  color:var(--accent); text-transform:uppercase;
  align-self:flex-start; margin-bottom:-6px;
}

/* scrollable rows — hide scrollbar but keep functionality */
.filters-row, .sticker-row {
  display:flex; gap:6px; overflow-x:auto; width:100%;
  padding-bottom:4px; -webkit-overflow-scrolling:touch;
  scrollbar-width:thin; scrollbar-color:var(--accent) var(--brown);
}
.filters-row::-webkit-scrollbar, .sticker-row::-webkit-scrollbar { height:3px; }
.filters-row::-webkit-scrollbar-thumb, .sticker-row::-webkit-scrollbar-thumb { background:var(--accent); }

.filter-btn {
  flex-shrink:0; padding: clamp(6px,2vw,8px) clamp(9px,2.5vw,13px);
  background:var(--brown); border:1px solid rgba(200,169,110,.3);
  border-radius:3px; color:var(--cream); font-family:inherit;
  font-size:clamp(.62rem,2vw,.7rem); letter-spacing:.05em;
  cursor:pointer; transition:all .15s; white-space:nowrap;
  min-height:40px; /* better touch target */
}
.filter-btn:hover { border-color:var(--accent); background:var(--surface); }
.filter-btn.active { background:var(--accent); color:var(--dark); border-color:var(--accent); font-weight:bold; }

.sticker-pick {
  flex-shrink:0; font-size:clamp(1.3rem,5vw,1.6rem); cursor:pointer;
  padding:clamp(4px,1.5vw,6px); border-radius:4px; border:1px solid transparent;
  background:var(--brown); transition:all .15s; line-height:1; user-select:none;
  min-width:40px; min-height:40px; display:flex; align-items:center; justify-content:center;
}
.sticker-pick:hover { border-color:var(--accent); background:var(--surface); transform:scale(1.15); }
.sticker-pick.selected { border-color:var(--accent); background:var(--surface); }
.sticker-clear {
  flex-shrink:0; font-size:clamp(.58rem,1.8vw,.65rem);
  padding:clamp(5px,1.5vw,7px) clamp(7px,2vw,10px);
  border:1px solid rgba(200,169,110,.35); background:transparent;
  color:var(--cream); font-family:inherit; border-radius:3px;
  cursor:pointer; letter-spacing:.07em; white-space:nowrap; min-height:40px;
}
.sticker-clear:hover { border-color:var(--accent); }

/* options */
.options-row {
  display:flex; gap:clamp(8px,2.5vw,14px); width:100%;
  flex-wrap:wrap; align-items:flex-start;
}
.opt-group { display:flex; flex-direction:column; gap:4px; }
.opt-label { font-size:clamp(.52rem,1.7vw,.6rem); letter-spacing:.14em; color:var(--accent); text-transform:uppercase; }
.opt-btns { display:flex; gap:5px; flex-wrap:wrap; }
.opt-btn {
  padding:clamp(5px,1.5vw,7px) clamp(9px,2.5vw,12px);
  border:1px solid rgba(200,169,110,.3); border-radius:3px;
  background:var(--brown); color:var(--cream); font-family:inherit;
  font-size:clamp(.62rem,2vw,.7rem); cursor:pointer; transition:all .15s;
  min-height:38px; min-width:38px;
}
.opt-btn:hover { border-color:var(--accent); }
.opt-btn.active { background:var(--accent); color:var(--dark); border-color:var(--accent); }

/* caption */
.caption-wrap { display:flex; gap:8px; width:100%; align-items:center; }
.caption-input {
  flex:1; padding:clamp(7px,2vw,9px) 10px; background:var(--brown);
  border:1px solid rgba(200,169,110,.3); border-radius:3px;
  color:var(--cream); font-family:inherit;
  font-size:clamp(.7rem,2.2vw,.8rem); outline:none;
  transition:border-color .15s; min-height:40px;
}
.caption-input::placeholder { color:rgba(200,169,110,.4); }
.caption-input:focus { border-color:var(--accent); }

/* shutter */
.shutter-wrap { display:flex; flex-direction:column; align-items:center; gap:8px; }
.shutter-btn {
  width:clamp(72px,18vw,88px); height:clamp(72px,18vw,88px);
  border-radius:50%; border:4px solid var(--accent);
  background:radial-gradient(circle at 40% 35%,#d4b87a,#8a6520);
  cursor:pointer; position:relative; transition:transform .1s;
  box-shadow: 0 0 0 3px var(--dark), 0 0 0 6px var(--accent), 0 4px 16px rgba(0,0,0,.6), inset 0 2px 4px rgba(255,255,255,.2);
  touch-action:manipulation;
}
.shutter-btn::after {
  content:''; position:absolute; inset:10px; border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#c8a050,#6a4a10);
  box-shadow:inset 0 2px 4px rgba(0,0,0,.4);
}
.shutter-btn:hover { transform:scale(1.05); }
.shutter-btn:active { transform:scale(0.92); }
.shutter-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }
.shutter-label { font-size:clamp(.55rem,1.8vw,.65rem); letter-spacing:.18em; color:var(--accent); text-transform:uppercase; }

.shot-counter { font-size:clamp(.65rem,2vw,.75rem); color:var(--accent); letter-spacing:.14em; min-height:1.2em; text-align:center; }

/* action btns */
.btn-row { display:flex; gap:clamp(8px,2.5vw,12px); align-items:center; flex-wrap:wrap; justify-content:center; }
.action-btn {
  padding:clamp(8px,2vw,10px) clamp(14px,4vw,20px);
  background:transparent; border:1px solid var(--accent); border-radius:3px;
  color:var(--cream); font-family:inherit; font-size:clamp(.7rem,2.2vw,.8rem);
  letter-spacing:.07em; cursor:pointer; transition:all .15s; display:none;
  min-height:44px; touch-action:manipulation;
}
.action-btn:hover { background:rgba(200,169,110,.12); }
.action-btn.primary { background:var(--accent); color:var(--dark); }
.action-btn.primary:hover { background:#d4b87a; }

/* progress */
.progress-bar-wrap {
  width:100%; height:3px; background:var(--brown);
  border-radius:2px; overflow:hidden; display:none;
}
.progress-bar { height:100%; background:var(--accent); width:0%; transition:width .3s; }

/* ── right col: film strip ── */
.right-col {
  display:flex; flex-direction:column; align-items:center;
  gap:10px; flex:0 0 auto;
  /* width driven by JS once we know screen size */
}
.strip-label { font-size:clamp(.55rem,1.8vw,.65rem); letter-spacing:.2em; color:var(--accent); text-transform:uppercase; display:none; }

.film-strip {
  display:none; flex-direction:column;
  background:#0a0a0a; border-radius:3px; overflow:hidden;
  box-shadow:0 4px 30px rgba(0,0,0,.8);
  /* width set by JS */
}
.sprockets-col {
  display:flex; flex-direction:column;
  justify-content:space-around; padding:4px 0;
  background:#111; flex-shrink:0; gap:5px;
  /* width set by JS */
}
.sprocket {
  background:#000; border-radius:2px;
  margin:0 auto; border:1px solid #222;
  /* size set by JS */
}
.strip-row { display:flex; align-items:stretch; }
.strip-photos { display:flex; flex-direction:column; flex:1; min-width:0; }
.strip-photo-slot { position:relative; background:#111; }
.strip-photo-slot canvas { display:block; width:100%; height:auto; }
.slot-number {
  position:absolute; bottom:3px; right:5px;
  font-size:clamp(.42rem,1.3vw,.54rem); color:rgba(200,169,110,.55); letter-spacing:.08em;
}
.strip-divider { background:#0a0a0a; }
.strip-footer {
  background:#0a0a0a; padding:5px 8px; text-align:center;
  font-size:clamp(.44rem,1.4vw,.52rem); color:rgba(200,169,110,.45); letter-spacing:.16em;
}
.strip-caption-display {
  background:#0a0a0a; padding:4px 8px 7px; text-align:center;
  font-size:clamp(.58rem,1.8vw,.68rem); color:rgba(200,169,110,.75);
  letter-spacing:.1em; font-style:italic;
}

canvas#captureCanvas { display:none; }

/* ─── BREAKPOINTS ─── */

/* Large tablet / desktop ≥ 768: strip goes to the right */
@media (min-width: 768px) {
  .main-layout { flex-wrap: nowrap; align-items: flex-start; }
}

/* Phone landscape — keep layout side-by-side, shrink gaps */
@media (max-height: 500px) and (orientation: landscape) {
  body { padding: 8px; }
  h1 { font-size: 1.1rem; margin-bottom: 2px; }
  .subtitle { margin-bottom: 6px; }
  .top-bar { margin-bottom: 6px; }
  .camera-wrapper { max-height: 55vw; }
}

/* Small phone < 400px */
@media (max-width: 399px) {
  .options-row { gap: 6px; }
  .opt-btn { min-width: 32px; padding: 5px 8px; }
}
</style>
</head>
<body class="theme-classic">

<h1>📷 RetroSnap</h1>
<p class="subtitle">Instant memories, timeless style</p>

<div class="top-bar">
  <span class="theme-lbl">Theme:</span>
  <button class="theme-btn active" data-theme="theme-classic">🎞 Classic</button>
  <button class="theme-btn" data-theme="theme-pink">🌸 Pastel</button>
  <button class="theme-btn" data-theme="theme-cyber">⚡ Cyber</button>
</div>

<div class="main-layout" id="mainLayout">
  <div class="left-col">

    <div class="camera-wrapper" id="cameraBox">
      <video id="video" autoplay playsinline muted></video>

      <div class="countdown-overlay" id="countdownOverlay">

      </div>
      <div class="opt-group">
        <span class="opt-label">Timer</span>
        <div class="opt-btns" id="timerBtns">

      <div class="opt-group">

    </div>

    <div class="shutter-wrap">
      <button class="shutter-btn" id="shutterBtn" aria-label="Take Snap"></button>
      <span class="shutter-label">Take Snap</span>

      <button class="action-btn primary" id="saveBtn">💾 Save Strip</button>

  <div class="right-col" id="rightCol">
    <div class="strip-label" id="stripLabel">🎞 Your Strip</div>
    <div class="film-strip" id="filmStrip">
      <div class="strip-row">
        <div class="sprockets-col" id="leftSprockets"></div>
        <div class="strip-photos" id="stripPhotos"></div>
        <div class="sprockets-col" id="rightSprockets"></div>
      </div>
      <div class="strip-caption-display" id="stripCaptionDisplay"></div>
      <div class="strip-footer">RETROSNAP • ISO 400</div>
    </div>
  </div>
</div>

<canvas id="captureCanvas"></canvas>

<script>
/* ── DOM refs ── */
const video      = document.getElementById('video');
const shutterBtn = document.getElementById('shutterBtn');
const countdownOverlay = document.getElementById('countdownOverlay');
const countdownNum     = document.getElementById('countdownNum');
const countdownLabel   = document.getElementById('countdownLabel');
const flashOverlay     = document.getElementById('flashOverlay');
const errorMsg         = document.getElementById('errorMsg');
const filmStrip        = document.getElementById('filmStrip');
const stripLabel       = document.getElementById('stripLabel');
const stripPhotos      = document.getElementById('stripPhotos');
const leftSprockets    = document.getElementById('leftSprockets');
const rightSprockets   = document.getElementById('rightSprockets');
const saveBtn          = document.getElementById('saveBtn');
const retakeBtn        = document.getElementById('retakeBtn');
const shotCounter      = document.getElementById('shotCounter');
const captureCanvas    = document.getElementById('captureCanvas');
const stickerLayer     = document.getElementById('stickerLayer');
const captionInput     = document.getElementById('captionInput');
const stripCaptionDisplay = document.getElementById('stripCaptionDisplay');
const progressWrap     = document.getElementById('progressWrap');
const progressBar      = document.getElementById('progressBar');
const rightCol         = document.getElementById('rightCol');
const mainLayout       = document.getElementById('mainLayout');
const ctx = captureCanvas.getContext('2d');

const FILTERS = {
  normal:    '',
  grayscale: 'grayscale(100%)',
  sepia:     'sepia(90%)',
  noir:      'grayscale(100%) contrast(180%) brightness(80%)',
  faded:     'saturate(50%) brightness(110%) contrast(85%)',
  vivid:     'saturate(180%) contrast(120%)',
  cool:      'saturate(110%) hue-rotate(20deg) brightness(95%)',
  warm:      'saturate(120%) hue-rotate(-20deg) sepia(30%)',
};

let currentFilter  = 'normal';
let capturedPhotos = [];
let photoWidth = 640, photoHeight = 480;
let shotCount  = 3, timerDelay = 3, showTimestamp = true;
let selectedEmoji  = null;
let placedStickers = [];

/* ── Responsive strip sizing ──
   Compute a slot width that fits the available screen without overflow.
   On wide screens: fixed nice size. On phones: fills remaining width.
*/
function computeSlotWidth() {
  const vw = window.innerWidth;
  const pad = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--pad')) || 16;

  if (vw >= 768) {
    // side-by-side: remaining space after left-col (~500px max) + gap
    const leftW = Math.min(500, vw * 0.55);
    const gap   = Math.max(16, vw * 0.03);
    const available = vw - leftW - gap - pad * 2 - 36; // 36 = two sprocket cols
    return Math.max(120, Math.min(220, available));
  } else {
    // stacked: full width minus padding and sprocket cols
    return Math.max(100, vw - pad * 2 - 36);
  }
}

function computeSprocketSize(slotW) {
  // sprocket col width and hole size scale with slot
  const colW = Math.max(12, Math.round(slotW * 0.1));
  const holeW = Math.max(7, Math.round(colW * 0.65));
  const holeH = Math.max(5, Math.round(holeW * 0.7));
  return { colW, holeW, holeH };
}

/* ── Camera ── */
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width:{ideal:1280}, height:{ideal:960} }, audio: false
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      photoWidth  = video.videoWidth  || 640;
      photoHeight = video.videoHeight || 480;
      captureCanvas.width  = photoWidth;
      captureCanvas.height = photoHeight;
    };
  } catch(e) {
    errorMsg.style.display = 'block';
    errorMsg.textContent = '📵 Camera access denied. Please allow permissions and reload.';
    shutterBtn.disabled = true;
  }
}

/* ── Themes ── */
document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.body.className = btn.dataset.theme;
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

/* ── Filters ── */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    video.style.filter = FILTERS[currentFilter] || '';
  });
});

/* ── Sticker picker ── */
document.querySelectorAll('.sticker-pick').forEach(sp => {
  sp.addEventListener('click', () => {
    selectedEmoji = sp.dataset.emoji;
    document.querySelectorAll('.sticker-pick').forEach(s => s.classList.remove('selected'));
    sp.classList.add('selected');
  });
});
document.getElementById('clearStickers').addEventListener('click', () => {
  placedStickers = []; stickerLayer.innerHTML = '';
  document.querySelectorAll('.sticker-pick').forEach(s => s.classList.remove('selected'));
  selectedEmoji = null;
});

function addStickerEl(emoji, xPct, yPct, stickerIdx) {
  const el = document.createElement('span');
  el.className = 'sticker-el';
  el.textContent = emoji;
  el.style.left = (xPct * 100) + '%';
  el.style.top  = (yPct * 100) + '%';

  const getRect = () => stickerLayer.getBoundingClientRect();

  function startDrag(clientX, clientY) {
    const r = getRect();
    const startLeft = xPct * r.width;
    const startTop  = yPct * r.height;
    let ox = clientX, oy = clientY;

    function onMove(cx, cy) {
      const r2 = getRect();
      const nx = Math.max(0, Math.min(r2.width,  startLeft + cx - ox));
      const ny = Math.max(0, Math.min(r2.height, startTop  + cy - oy));
      el.style.left = (nx / r2.width  * 100) + '%';
      el.style.top  = (ny / r2.height * 100) + '%';
      if (placedStickers[stickerIdx]) {
        placedStickers[stickerIdx].xPct = nx / r2.width;
        placedStickers[stickerIdx].yPct = ny / r2.height;
      }
    }
    return onMove;
  }

  let moveHandler = null;
  el.addEventListener('mousedown', e => {
    e.stopPropagation();
    const move = startDrag(e.clientX, e.clientY);
    moveHandler = ev => move(ev.clientX, ev.clientY);
    window.addEventListener('mousemove', moveHandler);
    window.addEventListener('mouseup', () => window.removeEventListener('mousemove', moveHandler), {once:true});
  });
  el.addEventListener('touchstart', e => {
    e.stopPropagation();
    const t = e.touches[0];
    const move = startDrag(t.clientX, t.clientY);
    const tm = ev => { const tt = ev.touches[0]; move(tt.clientX, tt.clientY); };
    window.addEventListener('touchmove', tm, {passive:true});
    window.addEventListener('touchend', () => window.removeEventListener('touchmove', tm), {once:true});
  }, {passive:true});

  stickerLayer.appendChild(el);
}

stickerLayer.addEventListener('click', e => {
  if (!selectedEmoji) return;
  const r = stickerLayer.getBoundingClientRect();
  const xPct = (e.clientX - r.left) / r.width;
  const yPct = (e.clientY - r.top)  / r.height;
  const idx  = placedStickers.length;
  placedStickers.push({ emoji: selectedEmoji, xPct, yPct });
  addStickerEl(selectedEmoji, xPct, yPct, idx);
});
stickerLayer.addEventListener('touchend', e => {
  if (!selectedEmoji) return;
  // only fire if not a drag (touchend fires on the layer, not el)
  if (e.target !== stickerLayer) return;
  const t = e.changedTouches[0];
  const r = stickerLayer.getBoundingClientRect();
  const xPct = (t.clientX - r.left) / r.width;
  const yPct = (t.clientY - r.top)  / r.height;
  const idx  = placedStickers.length;
  placedStickers.push({ emoji: selectedEmoji, xPct, yPct });
  addStickerEl(selectedEmoji, xPct, yPct, idx);
});

/* ── Options ── */
document.getElementById('shotCountBtns').addEventListener('click', e => {
  if (!e.target.dataset.shots) return;
  shotCount = +e.target.dataset.shots;
  document.querySelectorAll('#shotCountBtns .opt-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
});
document.getElementById('timerBtns').addEventListener('click', e => {
  if (!e.target.dataset.timer) return;
  timerDelay = +e.target.dataset.timer;
  document.querySelectorAll('#timerBtns .opt-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
});
document.getElementById('timestampBtns').addEventListener('click', e => {
  if (!e.target.dataset.ts) return;
  showTimestamp = e.target.dataset.ts === 'on';
  document.querySelectorAll('#timestampBtns .opt-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
});

/* ── Audio ── */
function playShutter() {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const buf = ac.createBuffer(1, ac.sampleRate * 0.12, ac.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i=0; i<d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/ac.sampleRate*60) * 0.8;
    const src = ac.createBufferSource(); src.buffer = buf;
    const g   = ac.createGain();
    g.gain.setValueAtTime(1, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, ac.currentTime+.12);
    src.connect(g); g.connect(ac.destination); src.start();
  } catch(e){}
}

/* ── Flash ── */
function flashScreen() {
  return new Promise(r => {
    flashOverlay.style.transition = 'none'; flashOverlay.style.opacity = '1';
    setTimeout(() => { flashOverlay.style.transition = 'opacity .3s'; flashOverlay.style.opacity = '0'; setTimeout(r, 300); }, 60);
  });
}

/* ── Countdown ── */
function countdown(n) {
  return new Promise(resolve => {
    countdownOverlay.style.display = 'flex';
    let cur = n;
    const labels = ['', '😬 almost...', '😏 steady...', '😄 get ready!', '😄 get ready!', '😄 get ready!'];
    const tick = () => {
      if (cur <= 0) { countdownOverlay.style.display = 'none'; resolve(); return; }
      countdownNum.textContent = cur;
      countdownNum.style.animation = 'none'; void countdownNum.offsetWidth;
      countdownNum.style.animation = 'pulse .6s ease-out';
      countdownLabel.textContent = labels[Math.min(cur, labels.length-1)];
      cur--;
      setTimeout(tick, 1000);
    };
    tick();
  });
}

/* ── Timestamp ── */
function getTimestamp() {
  const now = new Date();
  return now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) + ' ' +
         now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

/* ── Capture ── */
function capturePhoto() {
  captureCanvas.width  = photoWidth;
  captureCanvas.height = photoHeight;
  ctx.save();
  ctx.translate(photoWidth, 0); ctx.scale(-1, 1);
  ctx.filter = FILTERS[currentFilter] || 'none';
  ctx.drawImage(video, 0, 0, photoWidth, photoHeight);
  ctx.restore(); ctx.filter = 'none';

  // bake stickers
  const camRect = stickerLayer.getBoundingClientRect();
  placedStickers.forEach(s => {
    const px = (1 - s.xPct) * photoWidth;   // mirror X
    const py = s.yPct * photoHeight;
    const fontSize = Math.round(44 * Math.min(photoWidth/camRect.width, photoHeight/camRect.height));
    ctx.font = `${fontSize}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(s.emoji, px, py);
  });

  if (showTimestamp) {
    const ts = getTimestamp();
    const fh = Math.max(14, Math.round(photoHeight * .032));
    ctx.font = `${fh}px 'Courier New',monospace`;
    ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
    ctx.fillStyle = 'rgba(245,230,200,.82)';
    ctx.fillText(ts, photoWidth - 10, photoHeight - 8);
  }

  return captureCanvas.toDataURL('image/jpeg', .92);
}

/* ── Build strip ── */
function buildStrip(photos) {
  stripPhotos.innerHTML = '';
  leftSprockets.innerHTML = '';
  rightSprockets.innerHTML = '';

  const slotW = computeSlotWidth();
  const slotH = Math.round(slotW * (photoHeight / photoWidth));
  const { colW, holeW, holeH } = computeSprocketSize(slotW);
  const divH  = Math.max(3, Math.round(slotW * .025));
  const sprCount = photos.length * 4;

  // set sprocket col widths
  leftSprockets.style.width  = colW + 'px';
  rightSprockets.style.width = colW + 'px';

  // set film strip total width
  filmStrip.style.width = (slotW + colW * 2) + 'px';

  for (let i=0; i<sprCount; i++) {
    ['left','right'].forEach(side => {
      const s = document.createElement('div');
      s.className = 'sprocket';
      s.style.width  = holeW + 'px';
      s.style.height = holeH + 'px';
      (side==='left' ? leftSprockets : rightSprockets).appendChild(s);
    });
  }

  photos.forEach((dataUrl, idx) => {
    if (idx > 0) {
      const dv = document.createElement('div');
      dv.className = 'strip-divider'; dv.style.height = divH + 'px';
      stripPhotos.appendChild(dv);
    }
    const slot = document.createElement('div');
    slot.className = 'strip-photo-slot';
    slot.style.width  = slotW + 'px';
    slot.style.height = slotH + 'px';

    const c = document.createElement('canvas');
    c.width = slotW; c.height = slotH; c.style.display = 'block';
    const cctx = c.getContext('2d');
    const img  = new Image();
    img.onload = () => cctx.drawImage(img, 0, 0, slotW, slotH);
    img.src = dataUrl;

    const num = document.createElement('div');
    num.className = 'slot-number';
    num.textContent = String(idx+1).padStart(2,'0');
    slot.appendChild(c); slot.appendChild(num);
    stripPhotos.appendChild(slot);
  });

  const cap = captionInput.value.trim();
  stripCaptionDisplay.textContent = cap;
  stripCaptionDisplay.style.display = cap ? 'block' : 'none';

  filmStrip.style.display = 'flex';
  stripLabel.style.display = 'block';

  // on mobile (stacked), scroll strip into view
  if (window.innerWidth < 768) {
    setTimeout(() => filmStrip.scrollIntoView({ behavior:'smooth', block:'start' }), 100);
  }
}

/* ── Confetti ── */
function launchConfetti() {
  const colors = ['#f5e6c8','#c8a96e','#e87fa8','#b400ff','#00ffe0','#ff6b6b','#ffd93d','#6bcb77'];
  for (let i=0; i<70; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random()*100+'vw';
    el.style.top  = '-10px';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.transform  = `rotate(${Math.random()*360}deg)`;
    el.style.animationDuration = (1.2+Math.random()*1.5)+'s';
    el.style.animationDelay    = (Math.random()*.6)+'s';
    el.style.borderRadius = Math.random()>.5 ? '50%' : '2px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
}

/* ── Main shoot sequence ── */
async function takeSnaps() {
  capturedPhotos = [];
  shutterBtn.disabled = true;
  filmStrip.style.display = 'none';
  stripLabel.style.display = 'none';
  saveBtn.style.display = 'none';
  retakeBtn.style.display = 'none';
  progressWrap.style.display = 'block';
  progressBar.style.width = '0%';

  for (let i=0; i<shotCount; i++) {
    shotCounter.textContent = `📸 SHOT ${i+1} OF ${shotCount}`;
    progressBar.style.width = ((i/shotCount)*100)+'%';
    await countdown(timerDelay);
    playShutter();
    capturedPhotos.push(capturePhoto());
    await flashScreen();
    if (i < shotCount-1) await new Promise(r => setTimeout(r, 350));
  }

  progressBar.style.width = '100%';
  setTimeout(() => { progressWrap.style.display = 'none'; }, 500);
  shotCounter.textContent = `✅ ${shotCount} SHOTS TAKEN!`;
  buildStrip(capturedPhotos);
  launchConfetti();
  saveBtn.style.display = 'inline-block';
  retakeBtn.style.display = 'inline-block';
  shutterBtn.disabled = false;
}

shutterBtn.addEventListener('click', takeSnaps);

retakeBtn.addEventListener('click', () => {
  capturedPhotos = [];
  filmStrip.style.display = 'none';
  stripLabel.style.display = 'none';
  saveBtn.style.display = 'none';
  retakeBtn.style.display = 'none';
  shotCounter.textContent = '';
});

/* ── Save ── */
saveBtn.addEventListener('click', () => {
  if (!capturedPhotos.length) return;
  const slotW  = 320;
  const slotH  = Math.round(slotW * (photoHeight/photoWidth));
  const sprW   = 28, divH = 7, footerH = 26;
  const cap    = captionInput.value.trim();
  const capH   = cap ? 28 : 0;
  const totalH = slotH*capturedPhotos.length + divH*(capturedPhotos.length-1) + footerH + capH + 16;
  const totalW = slotW + sprW*2;

  const out = document.createElement('canvas');
  out.width = totalW; out.height = totalH;
  const oc  = out.getContext('2d');
  oc.fillStyle = '#0a0a0a'; oc.fillRect(0,0,totalW,totalH);

  function drawSprockets(x) {
    oc.fillStyle = '#111'; oc.fillRect(x,0,sprW,totalH);
    const n = capturedPhotos.length * 4;
    for (let i=0; i<n; i++) {
      const y = 6 + i*((totalH-12)/n);
      oc.fillStyle = '#000'; oc.beginPath();
      oc.roundRect(x+4, y, 20, 12, 2); oc.fill();
      oc.strokeStyle = '#222'; oc.lineWidth = .5; oc.stroke();
    }
  }
  drawSprockets(0); drawSprockets(sprW+slotW);

  Promise.all(capturedPhotos.map((dataUrl, idx) => new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const y = idx*(slotH+divH)+8;
      oc.drawImage(img, sprW, y, slotW, slotH);
      oc.fillStyle = 'rgba(200,169,110,.5)'; oc.font = '11px Courier New'; oc.textAlign = 'right';
      oc.fillText(String(idx+1).padStart(2,'0'), sprW+slotW-8, y+slotH-6);
      res();
    };
    img.src = dataUrl;
  }))).then(() => {
    const bb = capturedPhotos.length*(slotH+divH)-divH+8;
    if (cap) {
      oc.fillStyle='#0a0a0a'; oc.fillRect(sprW,bb,slotW,capH);
      oc.fillStyle='rgba(200,169,110,.75)'; oc.font='italic 13px Courier New'; oc.textAlign='center';
      oc.fillText(cap, totalW/2, bb+capH/2+5);
    }
    oc.fillStyle='#0a0a0a'; oc.fillRect(sprW,totalH-footerH,slotW,footerH);
    oc.fillStyle='rgba(200,169,110,.45)'; oc.font='9px Courier New'; oc.textAlign='center';
    oc.fillText('RETROSNAP \u2022 ISO 400 \u2022 '+new Date().getFullYear(), totalW/2, totalH-9);
    const a = document.createElement('a');
    a.download='retrosnap_strip.png'; a.href=out.toDataURL('image/png'); a.click();
  });
});

/* ── Rebuild strip on resize ── */
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (capturedPhotos.length) buildStrip(capturedPhotos);
  }, 200);
});

startCamera();
</script>
